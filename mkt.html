<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS Studio | AI Content Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --primary: #c3a06a; /* Gold/Bronze accent */
            --bg-dark: #0f1115;
            --surface: rgba(25, 27, 33, 0.6);
            --surface-hover: rgba(35, 38, 47, 0.8);
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --glass-bg: rgba(15, 17, 21, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(195, 160, 106, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(195, 160, 106, 0.08), transparent 25%);
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 2rem;
            min-height: 100vh;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* --- Header / Brand --- */
        .brand {
            margin-bottom: 2.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .brand-logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), #8a6f44);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #111;
            font-size: 1.2rem;
        }

        .brand-text h1 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .brand-text p {
            font-size: 0.8rem;
            color: var(--primary);
            letter-spacing: 1px;
        }

        /* --- Sidebar (Inputs) --- */
        .sidebar {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            height: fit-content;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select, input, textarea {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem;
            color: var(--text);
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            line-height: 1.5;
        }

        select:focus, input:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(195, 160, 106, 0.2);
        }

        option {
            background: var(--bg-dark);
            color: var(--text);
        }

        .btn-generate {
            background: linear-gradient(135deg, var(--primary), #8a6f44);
            color: #111;
            border: none;
            border-radius: 10px;
            padding: 1.2rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(195, 160, 106, 0.2);
        }

        .btn-generate:active {
            transform: translateY(0);
        }

        .btn-generate:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(0.98); }
        }

        /* --- Main Content (Output) --- */
        .workspace {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .workspace-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .workspace-header h2 {
            font-size: 1.5rem;
            font-weight: 400;
        }

        .actions {
            display: flex;
            gap: 1rem;
        }

        .btn-icon {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            width: 45px;
            height: 45px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.2rem;
        }

        .btn-icon:hover {
            background: var(--surface-hover);
            color: var(--primary);
            border-color: var(--primary);
        }

        .output-box {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem;
            flex: 1;
            overflow-y: auto;
            position: relative;
            line-height: 1.8;
            font-size: 1.05rem;
            color: #f1f5f9;
        }

        /* Markdown styling inside output */
        .output-box h1, .output-box h2, .output-box h3 {
            color: var(--primary);
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .output-box p {
            margin-bottom: 1rem;
        }

        .output-box ul, .output-box ol {
            margin-left: 2rem;
            margin-bottom: 1rem;
        }

        .output-box strong {
            color: #fff;
        }

        .placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            color: var(--text-muted);
            opacity: 0.5;
            text-align: center;
        }

        .placeholder i {
            font-size: 4rem;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--primary);
            color: #111;
            padding: 1rem 2rem;
            border-radius: 10px;
            font-weight: 600;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-logo">PS</div>
                <div class="brand-text">
                    <h1>PS Interior</h1>
                    <p>AI Content Generator</p>
                </div>
            </div>

            <form id="mktForm">
                <div class="form-group">
                    <label>Loại nội dung</label>
                    <select id="contentType" required>
                        <option value="Facebook Post">Bài đăng Facebook / Instagram (Chốt Sales)</option>
                        <option value="Blog Article">Bài viết Blog / Kiến thức (Chuẩn SEO)</option>
                        <option value="Video Script">Kịch bản Tiktok / Reels (Ngắn gọn, thu hút)</option>
                        <option value="PR Article">Bài đăng Báo chí / PR (Chuyên nghiệp)</option>
                        <option value="Email Newsletter">Email Marketing (Chăm sóc khách hàng)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Dự án / Hạng mục</label>
                    <select id="projectType">
                        <option value="Căn hộ cao cấp">Căn hộ chung cư cao cấp</option>
                        <option value="Nhà phố">Nhà phố / Townhouse</option>
                        <option value="Biệt thự">Biệt thự / Villa</option>
                        <option value="Penthouse / Duplex">Penthouse / Duplex</option>
                        <option value="Kiến thức / Phong thủy">Kiến thức Nội thất & Phong thủy</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Phong cách thiết kế</label>
                    <select id="designStyle">
                        <option value="Hiện đại (Modern)">Hiện đại (Modern) - Sang trọng, Tinh tế</option>
                        <option value="Wabi Sabi">Wabi Sabi - Mộc mạc, Tĩnh tại</option>
                        <option value="Tân Cổ Điển (Neoclassical)">Tân Cổ Điển - Quý phái, Lộng lẫy</option>
                        <option value="Japandi">Japandi - Tối giản, Ấm cúng</option>
                        <option value="Minimalism">Tối giản (Minimalism) - Thoáng đạt, Tự do</option>
                        <option value="Luxury">Luxury - Đẳng cấp, Độc bản</option>
                    </select>
                </div>

                <div class="form-group" style="flex:1">
                    <label>Từ khóa / Ý chính (Tùy chọn)</label>
                    <textarea id="keywords" placeholder="Ví dụ: Dự án Diamond Centery, 120m2, gỗ óc chó, thiết kế tối ưu đón ánh sáng tự nhiên, hợp mệnh Kim..."></textarea>
                </div>

                <button type="submit" class="btn-generate" id="generateBtn">
                    <i class="ri-magic-line"></i> Khởi tạo nội dung
                </button>
            </form>
        </aside>

        <!-- Main Workspace -->
        <main class="workspace">
            <div class="workspace-header">
                <h2>Kết quả dự kiến</h2>
                <div class="actions">
                    <button class="btn-icon" id="copyBtn" title="Sao chép nội dung">
                        <i class="ri-clipboard-line"></i>
                    </button>
                    <button class="btn-icon" id="clearBtn" title="Xóa nội dung">
                        <i class="ri-delete-bin-line"></i>
                    </button>
                </div>
            </div>

            <div class="output-box" id="outputArea">
                <div class="placeholder" id="placeholder">
                    <i class="ri-quill-pen-line"></i>
                    <p>Lựa chọn thông tin ở cột bên trái<br>và nhân "Khởi tạo" để AI tạo ra bài viết thượng lưu.</p>
                </div>
            </div>
        </main>
    </div>

    <div class="toast" id="toast">Đã sao chép vào bộ nhớ tạm!</div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        document.getElementById('mktForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('generateBtn');
            const outputArea = document.getElementById('outputArea');
            const placeholder = document.getElementById('placeholder');
            
            const contentType = document.getElementById('contentType').value;
            const projectType = document.getElementById('projectType').value;
            const designStyle = document.getElementById('designStyle').value;
            const keywords = document.getElementById('keywords').value;

            // Xử lý Giao diện lúc đợi
            btn.disabled = true;
            btn.innerHTML = '<i class="ri-loader-4-line ri-spin"></i> Đang phân tích...';
            if (placeholder) placeholder.style.display = 'none';
            outputArea.innerHTML = '<div style="text-align: center; color: var(--primary); margin-top: 100px;"><i class="ri-loader-2-line ri-spin ri-3x"></i><p style="margin-top: 20px;">AI đang trau chuốt từng câu chữ...</p></div>';

            try {
                // Gọi API backend
                const response = await fetch('/api/generate-mkt', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contentType,
                        projectType,
                        designStyle,
                        keywords
                    })
                });

                if (!response.ok) {
                    throw new Error(`Lỗi server: ${response.status}`);
                }

                const data = await response.json();
                
                // Hiển thị kết quả bằng Markdown parser
                outputArea.innerHTML = marked.parse(data.content);
                outputArea.dataset.raw = data.content; // Lưu nội dung raw để copy

            } catch (error) {
                outputArea.innerHTML = `<div style="color: #ef4444; text-align:center;">
                    <i class="ri-error-warning-line ri-3x"></i>
                    <p>Có lỗi xảy ra: ${error.message}</p>
                    <p>Vui lòng kiểm tra lại kết nối mạng hoặc API Key.</p>
                </div>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="ri-magic-line"></i> Khởi tạo nội dung';
            }
        });

        // Copy button
        document.getElementById('copyBtn').addEventListener('click', () => {
            const rawContent = document.getElementById('outputArea').dataset.raw;
            if (!rawContent) return;

            navigator.clipboard.writeText(rawContent).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            });
        });

        // Clear button
        document.getElementById('clearBtn').addEventListener('click', () => {
            const outputArea = document.getElementById('outputArea');
            outputArea.innerHTML = `
                <div class="placeholder" id="placeholder">
                    <i class="ri-quill-pen-line"></i>
                    <p>Lựa chọn thông tin ở cột bên trái<br>và nhân "Khởi tạo" để AI tạo ra bài viết thượng lưu.</p>
                </div>
            `;
            delete outputArea.dataset.raw;
            document.getElementById('mktForm').reset();
        });
    </script>
</body>
</html>
